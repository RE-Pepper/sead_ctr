name: Listen and notify Discord

on:
  pull_request_review_comment:
  pull_request_review:
  pull_request:
  issue_comment:
  issues:
  public:
  fork:
  branch_protection_rule:
  watch:
  push:
    branches:
      - main
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Discord
        env:
          PR_TITLE_RAW: ${{ github.event.pull_request.title }}
          COMMIT_MSG_RAW: ${{ github.event.head_commit.message }}
          ISSUE_TITLE_RAW: ${{ github.event.issue.title }}
        run: |
            EVENT="${{ github.event_name }}"
            USER="${{ github.actor }}"
            COLOR=10699520
            BOT_NAME="BOT:Pepper"
            FOOTER="${{ github.repository }}"
            TITLE="Activity detected"
            DESC="Activity detected"
            URL="https://github.com/${{ github.repository }}"

            format_msg() {
                local MSG="$1"
                MSG="${MSG//\`/\\\`}"   # escape backticks
                MSG="${MSG//$'\r'/}"    # remove CR
                if [ -z "${MSG// }" ]; then
                    echo "** **"
                else
                    echo "$MSG"
                fi
            }

            case "$EVENT" in
            push)
                FULL_MSG="$(format_msg "$COMMIT_MSG_RAW")"
                SHORT_MSG="${FULL_MSG%%$'\n'*}"
                URL="${{ github.event.head_commit.url }}"
                TITLE="New commit by $USER"
                DESC="**${SHORT_MSG:-** **}**"
                ;;

            pull_request)
                PR_ACTION="${{ github.event.action }}"
                PR_TITLE="$(format_msg "$PR_TITLE_RAW")"
                URL="${{ github.event.pull_request.html_url }}"

                if [ "$PR_ACTION" = "opened" ]; then
                    DESC="$USER: **${PR_TITLE}**"
                    TITLE="Pull Request opened"
                elif [ "$PR_ACTION" = "closed" ]; then
                    if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
                        TITLE="Pull Request merged"
                    else
                        TITLE="Pull Request closed"
                    fi
                    DESC="by $USER: **${PR_TITLE}**"
                else
                    exit 0
                fi
                ;;

            pull_request_review_comment)
                TITLE="Pull Request comment by $USER"
                DESC="Click the link to read it"
                URL="${{ github.event.pull_request.html_url }}"
                ;;

            issues)
                ISSUE_ACTION="${{ github.event.action }}"
                ISSUE_TITLE="$(format_msg "$ISSUE_TITLE_RAW")"
                URL="${{ github.event.issue.html_url }}"

                if [ "$ISSUE_ACTION" = "opened" ]; then
                    TITLE="Issue opened"
                elif [ "$ISSUE_ACTION" = "closed" ]; then
                    TITLE="Issue closed"
                else
                    exit 0
                fi
                DESC="by $USER: **${ISSUE_TITLE}**"
                ;;

            issue_comment)
                TITLE="Issue comment by $USER"
                URL="${{ github.event.issue.html_url }}"
                ;;

            fork)
                TITLE="Repository forked by $USER"
                DESC="Fork: ${{ github.event.forkee.full_name }}"
                URL="https://github.com/${{ github.event.forkee.full_name }}"
                ;;

            watch)
                TITLE="Repository starred by $USER"
                DESC="Thank you!"
                ;;

            public)
                TITLE="Repository made public"
                DESC="by $USER..."
                ;;

            branch_protection_rule)
                TITLE="Protection rules updated"
                DESC="The protection rules of the repo were updated"
                ;;

            *)
                TITLE="Something happened by $USER"
                DESC="\`$EVENT\`"
                ;;
            esac

            # Build and send embed
            PAYLOAD=$(jq -n \
            --arg username "$BOT_NAME" \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg footer "$FOOTER" \
            --arg url "$URL" \
            --argjson color "$COLOR" \
            --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{
                username: $username,
                embeds: [
                {
                    title: $title,
                    description: $desc,
                    url: $url,
                    color: $color,
                    footer: { text: $footer },
                    timestamp: $timestamp
                }
                ]
            }')

            echo "Sending $TITLE ..."
            HTTP_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Content-Type: application/json" \
                -X POST \
                -d "$PAYLOAD" \
                "${{ secrets.DISCORD_WEBHOOK }}")

            if [ "$HTTP_RESPONSE" -ne 204 ]; then
                echo "Failed with status $HTTP_RESPONSE"
                exit 1
            fi
            echo "Sent!"
